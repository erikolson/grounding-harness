name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: pytest -q
      # The end-to-end gate: a real loader reads a real file, the verifier runs,
      # and the runner exits non-zero on any ungrounded claim. Offline by default
      # (the extractive generator needs no model), so it is safe in CI.
      - run: python examples/ground_markdown.py tests/fixtures/sample.md
